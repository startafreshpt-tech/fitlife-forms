<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fit Life After 40 — YouTube</title>
<style>
  :root{ --bg:#f4f1ea; --card:#fff; --line:#dfe4e1; --ink:#1c2b27; --muted:#5d6b66;
    --green:#1f6f54; --green-dark:#164f3d; --green-soft:#e8f1ec; --gold:#c2792b; --gold-soft:#f7ecdc; --red:#9a2b1e; }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{background:var(--bg); color:var(--ink); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; min-height:100vh; padding-bottom:60px; line-height:1.55;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .spin{display:inline-block; width:16px; height:16px; border:2px solid var(--line); border-top-color:var(--green); border-radius:50%; animation:spin .7s linear infinite;}
  input,select,button{font-family:inherit;}
  input::placeholder{color:#9aa39e;}
  a{color:var(--green); text-decoration:none;}

  #login{max-width:360px; margin:90px auto; text-align:center; padding:0 20px;}
  #login .box{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:26px;}
  #login input{width:100%; background:#fff; border:1px solid var(--line); border-radius:8px; padding:12px 14px; color:var(--ink); font-size:14px; outline:none;}
  #login input:focus{border-color:var(--green); box-shadow:0 0 0 3px var(--green-soft);}
  #login button{width:100%; margin-top:12px; background:var(--green); color:#fff; border:none; border-radius:8px; padding:12px; font-size:14px; font-weight:700; cursor:pointer;}
  .kick{display:inline-block; font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--green); background:var(--green-soft); padding:5px 12px; border-radius:999px; font-weight:700;}

  header{border-bottom:1px solid var(--line); position:sticky; top:0; background:var(--bg); z-index:10; padding:18px 24px 0;}
  .hwrap{max-width:820px; margin:0 auto;}
  .brandrow{display:flex; align-items:center; gap:12px; margin-bottom:18px;}
  .logo{width:36px; height:36px; border-radius:8px; background:var(--green); display:flex; align-items:center; justify-content:center; font-size:18px; font-weight:900; color:#fff;}
  .brandrow .t{font-size:16px; font-weight:800; color:var(--green-dark);}
  .brandrow .s{font-size:12px; color:var(--muted);}
  .backhub{margin-left:auto; font-size:12px; color:var(--muted); border:1px solid var(--line); padding:7px 12px; border-radius:8px;}
  .backhub:hover{color:var(--green-dark); border-color:var(--green);}
  .tabs{display:flex; gap:2px;}
  .tab{background:none; border:none; cursor:pointer; padding:10px 14px; font-size:13px; font-weight:600; color:var(--muted); border-bottom:2px solid transparent; display:flex; align-items:center; gap:6px;}
  .tab.active{color:var(--green-dark); border-bottom-color:var(--gold);}

  .wrap{max-width:820px; margin:0 auto; padding:28px 24px;}
  .lead{color:var(--muted); font-size:14px; margin-bottom:20px; line-height:1.6;}
  .modes{display:flex; gap:8px; margin-bottom:14px; flex-wrap:wrap;}
  .modebtn{background:var(--card); color:var(--muted); border:1px solid var(--line); border-radius:8px; padding:8px 14px; font-size:13px; font-weight:600; cursor:pointer; display:flex; align-items:center; gap:6px;}
  .row{display:flex; gap:10px; margin-bottom:20px;}
  .row input{flex:1; background:var(--card); border:1px solid var(--line); border-radius:8px; padding:12px 16px; color:var(--ink); font-size:14px; outline:none;}
  .row input:focus{border-color:var(--green); box-shadow:0 0 0 3px var(--green-soft);}
  .go{background:var(--green); color:#fff; border:none; border-radius:8px; padding:12px 24px; font-size:14px; font-weight:700; cursor:pointer; white-space:nowrap; display:flex; align-items:center; gap:8px;}
  .go:hover{background:var(--green-dark);}
  .go:disabled{background:var(--line); color:var(--muted); cursor:not-allowed;}
  .err{color:var(--red); font-size:13px; margin-bottom:14px;}

  .tcard{background:var(--card); border:1px solid var(--line); border-radius:10px; padding:14px 16px; display:flex; gap:12px; align-items:flex-start; margin-bottom:10px;}
  .sbox{width:44px; height:44px; border-radius:8px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:15px; font-family:monospace;}
  .tbody{flex:1; min-width:0;}
  .ttitle{font-size:14px; font-weight:600; line-height:1.5;}
  .tfb{font-size:12px; color:var(--muted); margin-top:5px; line-height:1.5;}
  .copy{background:none; border:1px solid var(--line); border-radius:6px; padding:5px 10px; color:var(--muted); font-size:12px; cursor:pointer; flex-shrink:0;}
  .copy:hover{color:var(--green-dark); border-color:var(--green);}
  .foot{font-size:12px; color:var(--muted); text-align:right; margin-top:6px;}

  .preview{background:var(--card); border:2px solid var(--line); border-radius:12px; padding:18px 20px; margin-bottom:24px; display:flex; gap:16px; align-items:flex-start;}
  .ring{width:56px; height:56px; border-radius:12px; flex-shrink:0; display:flex; flex-direction:column; align-items:center; justify-content:center;}
  .ring .n{font-size:18px; font-weight:900; font-family:monospace; line-height:1;}
  .ring .l{font-size:9px; color:var(--muted); text-transform:uppercase; margin-top:2px;}
  .pvttl{font-size:16px; font-weight:800; line-height:1.4; margin-bottom:6px; color:var(--green-dark);}
  .cols{display:flex; flex-direction:column; gap:10px; margin-bottom:22px;}
  .colrow{display:flex; align-items:center; gap:10px;}
  .collabel{width:150px; flex-shrink:0; font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.06em; text-align:right;}
  .colrow select{flex:1; background:var(--card); border:1px solid var(--line); border-radius:8px; padding:8px 12px; font-size:13px; font-weight:600; cursor:pointer; outline:none;}
  .colrow select:focus{border-color:var(--green);}
  .shuffle{width:100%; background:var(--card); border:1px solid var(--line); border-radius:8px; padding:10px; color:var(--muted); font-size:13px; font-weight:600; cursor:pointer; margin-bottom:22px;}
  .shuffle:hover{border-color:var(--green); color:var(--green-dark);}
  .savebtn{background:none; border:1px solid var(--line); border-radius:6px; padding:5px 10px; font-size:12px; cursor:pointer; font-weight:600;}
  .hist h4{font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; margin-bottom:10px; font-weight:700;}
</style>
</head>
<body>

<div id="login">
  <span class="kick">Fit Life After 40</span>
  <div class="box" style="margin-top:12px;">
    <div style="font-size:18px; font-weight:800; margin-bottom:14px; color:var(--green-dark);">YouTube tools</div>
    <input type="password" id="pw" placeholder="Admin password" onkeydown="if(event.key==='Enter')login()" />
    <button onclick="login()">Log in</button>
    <div id="loginNote" style="font-size:12px; color:var(--muted); margin-top:8px;"></div>
  </div>
</div>

<div id="app" style="display:none;">
  <header>
    <div class="hwrap">
      <div class="brandrow">
        <div class="logo">&#9654;</div>
        <div><div class="t">Fit Life After 40</div><div class="s">YouTube tools</div></div>
        <a class="backhub" href="https://startafreshpt-tech.github.io/fitlife-forms/admin.html">Coach dashboard</a>
      </div>
      <div class="tabs">
        <button class="tab active" id="tab-gen" onclick="showTab('gen')">&#10022; Title Generator</button>
        <button class="tab" id="tab-build" onclick="showTab('build')">&#8862; Title Builder</button>
        <button class="tab" id="tab-library" onclick="showTab('library')">&#9638; Video Library</button>
        <button class="tab" id="tab-next" onclick="showTab('next')">&#9678; What to Make Next</button>
        <button class="tab" id="tab-intel" onclick="showTab('intel')">&#9670; Content Intel</button>
      </div>
    </div>
  </header>
  <div class="wrap"><div id="view"></div></div>
</div>

<script>
  const API = "https://eqevyohstkwqslloqsni.supabase.co/functions/v1/yt-titles";
  let PW = sessionStorage.getItem("fl_admin_pw") || "";
  const C = { green:"#1f6f54", gold:"#c2792b", red:"#9a2b1e", muted:"#5d6b66", line:"#dfe4e1" };

  const API2 = "https://eqevyohstkwqslloqsni.supabase.co/functions/v1/yt-data";
  async function call(payload){ const r=await fetch(API,{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({password:PW,...payload})}); return r.json(); }
  async function call2(payload){ const r=await fetch(API2,{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({password:PW,...payload})}); return r.json(); }
  function dstr(v){ return v ? new Date(v).toLocaleDateString("en-NZ",{day:"numeric",month:"short",year:"2-digit"}) : "-"; }
  function fmtN(n){ if(!n&&n!==0) return "—"; if(n>=1e6) return (n/1e6).toFixed(1)+"M"; if(n>=1e3) return (n/1e3).toFixed(1)+"K"; return String(n); }
  function esc(s){ return (s==null?"":String(s)).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
  function scoreColor(s){ if(s==null) return C.muted; if(s>=70) return C.green; if(s>=50) return C.gold; return C.red; }
  function copy(t){ navigator.clipboard && navigator.clipboard.writeText(t); }

  async function login(){
    PW=document.getElementById("pw").value;
    const r=await call({action:"ping"});
    if(r.ok){ sessionStorage.setItem("fl_admin_pw",PW); document.getElementById("login").style.display="none"; document.getElementById("app").style.display="block"; showTab("gen"); }
    else document.getElementById("loginNote").textContent = r.error==="unauthorized" ? "Wrong password." : (r.error||"Could not log in.");
  }
  function showTab(t){
    ["gen","build","library","next","intel"].forEach(id=>{ const el=document.getElementById("tab-"+id); if(el) el.classList.toggle("active", id===t); });
    if(t==="gen") renderGen();
    else if(t==="build") renderBuild();
    else if(t==="library") loadLibrary();
    else if(t==="next") loadNext();
    else if(t==="intel") renderIntel();
  }

  /* ---------- Title Generator ---------- */
  let GEN = { mode:"claude", topic:"", titles:[] };
  function renderGen(){
    const modes=[["claude","✦ Proven formats"],["surprise","⚡ Surprise me"]];
    let h='<p class="lead">Enter a topic. Six titles are generated in your channel style, then each is scored for click-through potential.</p>';
    h+='<div class="modes">'+modes.map(m=>'<button class="modebtn" style="'+(GEN.mode===m[0]?('color:'+C.green+';border-color:'+C.green+'66;background:'+C.green+'14'):'')+'" onclick="GEN.mode=\''+m[0]+'\';GEN.titles=[];renderGen()">'+m[1]+'</button>').join("")+'</div>';
    h+='<div class="row"><input id="topic" value="'+esc(GEN.topic)+'" placeholder="e.g. walking for weight loss after 50" onkeydown="if(event.key===\'Enter\')genTitles()" /><button class="go" id="genBtn" onclick="genTitles()">'+(GEN.mode==="surprise"?"⚡ Surprise Me":"Generate Titles")+'</button></div>';
    h+='<div id="genErr" class="err" style="display:none;"></div><div id="genList"></div>';
    document.getElementById("view").innerHTML=h;
    if(GEN.titles.length) paintGen();
  }
  async function genTitles(){
    GEN.topic=document.getElementById("topic").value.trim();
    if(!GEN.topic) return;
    const btn=document.getElementById("genBtn"); btn.disabled=true; btn.innerHTML='<span class="spin"></span> Generating...';
    document.getElementById("genErr").style.display="none";
    const r=await call({action:"generate", topic:GEN.topic, mode:GEN.mode});
    btn.disabled=false; btn.textContent=(GEN.mode==="surprise"?"⚡ Surprise Me":"Generate Titles");
    if(!r.ok || !r.titles || !r.titles.length){ const e=document.getElementById("genErr"); e.style.display="block"; e.textContent=r.error||"No titles came back. Try again."; return; }
    GEN.titles=r.titles.map(t=>({title:t, score:null, feedback:"", loading:true}));
    paintGen();
    GEN.titles.forEach((t,i)=>scoreGen(i,t.title));
  }
  async function scoreGen(i,title){ const r=await call({action:"score", title}); GEN.titles[i]={title, score:r.score??null, feedback:r.feedback||"", loading:false}; paintGen(); }
  function paintGen(){
    const list=document.getElementById("genList"); if(!list) return;
    const sorted=[...GEN.titles].sort((a,b)=>{ if(a.loading&&!b.loading)return 1; if(!a.loading&&b.loading)return -1; return (b.score||0)-(a.score||0); });
    list.innerHTML=sorted.map(t=>{ const col=scoreColor(t.score); return '<div class="tcard" style="border-color:'+(t.score>=70?col+"55":C.line)+'">'
      +'<div class="sbox" style="background:'+(t.loading?"#f0eee7":col+"18")+';border:1px solid '+(t.loading?C.line:col+"44")+';color:'+col+'">'+(t.loading?'<span class="spin"></span>':(t.score!=null?t.score:"—"))+'</div>'
      +'<div class="tbody"><div class="ttitle">'+esc(t.title)+'</div>'+(t.loading?'<div class="tfb">Scoring...</div>':(t.feedback?'<div class="tfb">'+esc(t.feedback)+'</div>':''))+'</div>'
      +'<button class="copy" onclick="copy(\''+esc(t.title).replace(/\x27/g,"\\x27")+'\')">Copy</button></div>'; }).join("")
      +'<div class="foot">Estimated score, 70+ is the target. Live VidIQ scoring coming once your VidIQ is connected.</div>';
  }

  /* ---------- Title Builder ---------- */
  const COLS=[
    {id:"prefix",label:"ONE THING",color:"#2563eb",options:["One Simple","This One","One Overlooked","One Essential","This ONE","One Underrated","One Proven","One Joint-Friendly","One Forgotten","One Genius","One Gentle","One Daily","The Only","The Best","The #1","The Perfect","The 60-Second","This Simple","This Easy","How to Do the","3 Simple","5 Essential","7 Highly Effective","The One Doctors Recommend","One No-Equipment","One Low-Impact","One Underestimated"]},
    {id:"movement",label:"MOVEMENT",color:"#be185d",options:["Exercise","Chair Exercise","Standing Exercise","Seated Exercise","Wall Exercise","Band Exercise","Resistance Band Move","Core Exercise","Kettlebell Move","Dumbbell Move","Bodyweight Move","Carry Exercise","Cardio Move","Walking Habit","Walking Workout","Strength Move","Balance Exercise","Balance Drill","Mobility Drill","Stretching Routine","Hip Hinge","Squat Variation","Glute Exercise","Leg Exercise","Calf Raise","Step-Up","Wall Sit","Farmer's Carry","Posture Drill","Warm-Up","Stretch"]},
    {id:"outcome",label:"UNIVERSAL OUTCOME",color:"#1f6f54",options:["Builds Muscle Everywhere","Gets You Stronger","Builds Full Body Strength","Builds Real Strength","Improves Strength and Stability","Improves Balance","Improves Balance and Coordination","Improves Stability","Improves Walking Confidence","Builds Leg Strength","Builds Lower Body Strength","Builds Upper Body Strength","Builds Core Strength","Improves Posture","Protects Your Knees","Saves Your Back","Eases Joint Pain","Prevents Falls","Keeps You Independent","Boosts Your Energy","Improves Mobility","Improves Flexibility","Reverses Muscle Loss","Builds Bone Strength","Steadies Your Balance","Flattens Your Belly","Tones Your Arms","Keeps You Active for Life"]},
    {id:"removal",label:"REMOVAL / RELIEF",color:"#b45309",options:["","Without Wrecking Your Joints","Without Fancy Equipment","Without Heavy Weights","Without Any Equipment","Without Maxing Out","Without Ego Lifting","Without Going to a Gym","Without Hurting Your Back","Without Risking Injury","Without Getting on the Floor","Without Kneeling","Without Jumping","Without Pain","Without a Trainer","Without Leaving Home","With Zero Impact","in Just 10 Minutes","in Under 5 Minutes"]},
    {id:"age",label:"AGE",color:"#7c3aed",options:["After 50","After 55","After 60","After 65","After 70","Over 50","Over 55","Over 60","Over 65","In Your 50s","In Your 60s","In Your 70s","If You're 50+","for Seniors","for Beginners Over 50","At Any Age",""]},
    {id:"novelty",label:"NOVELTY / ANGLE",color:"#a16207",options:["","Built for Over-50s","Almost Nobody Trains This","Everyone Over 50 Should Be Doing This","Simple but Effective","Low Impact, High Return","Nobody Talks About This","Overlooked but Powerful","More Effective Than It Looks","Knee-Safe","Backed by Science","Doctor-Approved","Physios Swear By This","Most People Get This Wrong","Most People Skip This","Stop Ignoring This","Start This Today","The Secret to Aging Strong","Gentle but Powerful","The Game-Changer for Over-50s","Underrated but Essential","Trainers Do This Daily","You'll Feel It in a Week"]},
  ];
  let SEL={}, HIST=[], scoreTimer=null, BSTATE={score:null,feedback:"",scoring:false};
  function assemble(){ const s=SEL; let t=[s.prefix,s.movement].filter(Boolean).join(" "); if(s.outcome) t+=" That "+s.outcome; if(s.removal) t+=" "+s.removal; if(s.age) t+=" "+s.age; if(s.novelty) t+=" ("+s.novelty+")"; return t.trim(); }
  function renderBuild(){
    if(!Object.keys(SEL).length) COLS.forEach(c=>SEL[c.id]=c.options[0]);
    let h='<p class="lead">Build a title by choosing from each column. It is scored automatically as you change selections.</p>';
    h+='<div id="pv"></div>';
    h+='<div class="cols">'+COLS.map(c=>'<div class="colrow"><div class="collabel" style="color:'+c.color+'">'+c.label+'</div><select onchange="onSel(\''+c.id+'\',this.value)">'+c.options.map(o=>'<option value="'+esc(o)+'"'+(SEL[c.id]===o?" selected":"")+'>'+(o?esc(o):"(none, omit this part)")+'</option>').join("")+'</select></div>').join("")+'</div>';
    h+='<button class="shuffle" onclick="shuffle()">🎲 Random shuffle</button>';
    h+='<div class="hist" id="histBox"></div>';
    document.getElementById("view").innerHTML=h;
    paintPreview(); paintHist();
    triggerScore();
  }
  function onSel(id,val){ SEL[id]=val; paintPreview(); triggerScore(); }
  function triggerScore(){ if(scoreTimer) clearTimeout(scoreTimer); BSTATE={score:null,feedback:"",scoring:true}; paintPreview(); const title=assemble(); scoreTimer=setTimeout(async()=>{ const r=await call({action:"score", title}); BSTATE={score:r.score??null, feedback:r.feedback||"", scoring:false}; paintPreview(); }, 800); }
  function paintPreview(){
    const box=document.getElementById("pv"); if(!box) return;
    const title=assemble(); const col=scoreColor(BSTATE.score);
    box.innerHTML='<div class="preview" style="border-color:'+col+'55">'
      +'<div class="ring" style="background:'+col+'14;border:2px solid '+col+'55">'+(BSTATE.scoring?'<span class="spin"></span>':'<div class="n" style="color:'+col+'">'+(BSTATE.score!=null?BSTATE.score:"—")+'</div><div class="l">score</div>')+'</div>'
      +'<div style="flex:1;min-width:0"><div class="pvttl">'+esc(title)+'</div>'+(BSTATE.scoring?'<div class="tfb">Scoring...</div>':(BSTATE.feedback?'<div class="tfb">'+esc(BSTATE.feedback)+'</div>':''))+'</div>'
      +'<div style="display:flex;flex-direction:column;gap:6px;flex-shrink:0"><button class="copy" onclick="copy(\''+esc(title).replace(/\x27/g,"\\x27")+'\')">Copy</button><button class="savebtn" style="color:'+col+';border-color:'+col+'44" onclick="saveHist()">Save</button></div></div>';
  }
  function saveHist(){ if(BSTATE.score==null) return; const title=assemble(); HIST=[{title,score:BSTATE.score,feedback:BSTATE.feedback,id:Date.now()},...HIST.filter(h=>h.title!==title)].slice(0,10); paintHist(); }
  function paintHist(){
    const box=document.getElementById("histBox"); if(!box) return;
    if(!HIST.length){ box.innerHTML=""; return; }
    box.innerHTML='<h4>Saved titles</h4>'+HIST.map(h=>{ const col=scoreColor(h.score); return '<div class="tcard" style="padding:10px 14px;margin-bottom:8px"><div class="sbox" style="width:36px;height:36px;font-size:13px;background:'+col+'14;border:1px solid '+col+'44;color:'+col+'">'+(h.score!=null?h.score:"—")+'</div><div class="tbody"><div class="ttitle" style="font-size:13px">'+esc(h.title)+'</div></div><button class="copy" onclick="copy(\''+esc(h.title).replace(/\x27/g,"\\x27")+'\')">Copy</button></div>'; }).join("");
  }
  function shuffle(){ COLS.forEach(c=>{ const opts=(c.id==="removal"||c.id==="novelty"||c.id==="age")?c.options:c.options.filter(o=>o); SEL[c.id]=opts[Math.floor(Math.random()*opts.length)]; }); renderBuild(); }

  /* ---------- Video Library ---------- */
  let LIB=[];
  async function loadLibrary(){
    const view=document.getElementById("view");
    view.innerHTML='<p class="lead">Your recent videos ranked by real view count, straight from your channel feed.</p><div class="tcard"><span class="spin"></span> &nbsp;Loading your videos...</div>';
    const r=await call2({action:"channel_videos"});
    if(!r.ok||!r.videos){ view.innerHTML='<div class="tcard">'+esc(r.error||"Could not load videos.")+'</div>'; return; }
    LIB=r.videos; renderLibrary("views");
  }
  function renderLibrary(sortBy){
    let vids=[...LIB];
    if(sortBy==="recent") vids.sort((a,b)=>new Date(b.publishedAt)-new Date(a.publishedAt)); else vids.sort((a,b)=>b.views-a.views);
    const max=Math.max.apply(null, LIB.map(v=>v.views).concat([1]));
    let h='<p class="lead">Your latest videos ranked by real view count, from your channel feed.</p>';
    h+='<div class="modes"><button class="modebtn" style="'+(sortBy!=="recent"?'color:'+C.green+';border-color:'+C.green+'66':'')+'" onclick="renderLibrary(\'views\')">Most views</button><button class="modebtn" style="'+(sortBy==="recent"?'color:'+C.green+';border-color:'+C.green+'66':'')+'" onclick="renderLibrary(\'recent\')">Newest</button><span class="foot" style="align-self:center;margin:0 0 0 auto">'+LIB.length+' videos</span></div>';
    h+=vids.map((v,i)=>'<div class="tcard" style="position:relative;overflow:hidden"><div style="position:absolute;bottom:0;left:0;height:3px;width:'+((v.views/max)*100).toFixed(1)+'%;background:'+C.green+'66"></div><div style="width:24px;color:'+C.muted+';font-size:12px;font-family:monospace;padding-top:2px">#'+(i+1)+'</div><div class="tbody"><a href="https://youtu.be/'+v.id+'" target="_blank" class="ttitle" style="display:block">'+esc(v.title)+'</a><div style="display:flex;gap:16px;margin-top:6px"><span style="font-size:12px;color:'+C.green+';font-family:monospace;font-weight:700">'+fmtN(v.views)+' views</span><span style="font-size:12px;color:'+C.muted+'">'+dstr(v.publishedAt)+'</span></div></div></div>').join("");
    document.getElementById("view").innerHTML=h;
  }

  /* ---------- What to Make Next ---------- */
  async function loadNext(){
    const view=document.getElementById("view");
    view.innerHTML='<p class="lead">Claude reads your recent videos and their views, then recommends your next 5.</p><div class="tcard"><span class="spin"></span> &nbsp;Analysing your channel...</div>';
    const r=await call2({action:"recommend"});
    if(!r.ok){ view.innerHTML='<div class="tcard">'+esc(r.error||"Error")+'</div>'; return; }
    const s=r.summary||{};
    let h='<p class="lead">Recommendations based on your recent videos and their real view counts.</p>';
    h+='<div class="foot" style="text-align:left;margin:0 0 16px">'+(s.videoCount||0)+' recent videos analysed'+(s.topVideo?' · top: "'+esc(s.topVideo.title)+'" ('+fmtN(s.topVideo.views)+' views)':'')+'</div>';
    h+=(r.recs||[]).map(rc=>{ const col=rc.estimatedPotential==="high"?C.green:rc.estimatedPotential==="medium"?C.gold:C.red; const lbl=rc.estimatedPotential==="high"?"High potential":rc.estimatedPotential==="medium"?"Strong pick":"Solid play"; return '<div class="tcard" style="flex-direction:column;align-items:stretch;gap:8px"><div style="display:flex;justify-content:space-between;gap:10px;align-items:flex-start"><div style="font-size:15px;font-weight:700;color:var(--green-dark);line-height:1.4">'+esc(rc.title)+'</div><span style="font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;background:'+col+'18;color:'+col+';white-space:nowrap">'+lbl+'</span></div>'+(rc.rationale?'<div style="font-size:13px;color:'+C.muted+';line-height:1.6">'+esc(rc.rationale)+'</div>':'')+(rc.format?'<div><span style="font-size:11px;padding:3px 9px;border-radius:6px;background:var(--green-soft);color:var(--green-dark);font-weight:600">'+esc(rc.format)+'</span></div>':'')+'</div>'; }).join("");
    h+='<button class="shuffle" style="margin-top:12px" onclick="loadNext()">Refresh recommendations</button>';
    document.getElementById("view").innerHTML=h;
  }

  /* ---------- Content Intel ---------- */
  let INTEL={};
  const MAGROW=[["grownups","🇳🇿 Grownups NZ"],["superage","🇺🇸 Super Age"],["eatthis","🇺🇸 Eat This Not That"]];
  function renderIntel(){
    let h='<p class="lead">Scan health publications for what is trending, then turn it into video ideas cross-referenced against your channel formats.</p>';
    h+=MAGROW.map(m=>{ const d=INTEL[m[0]]; let c='<div class="tcard" style="flex-direction:column;align-items:stretch;gap:10px"><div style="display:flex;justify-content:space-between;align-items:center"><div style="font-weight:700;color:var(--green-dark)">'+m[1]+'</div><button class="modebtn" id="scan_'+m[0]+'" onclick="scanMag(\''+m[0]+'\')">'+(d?"Re-scan":"Scan")+'</button></div>';
      if(d&&d.topics&&d.topics.length){ c+=d.topics.map(t=>'<div style="border:1px solid var(--line);border-radius:8px;padding:8px 12px"><div style="font-size:13px;font-weight:600">'+esc(t.headline)+'</div>'+(t.youtubeOpportunity?'<div style="font-size:12px;color:'+C.green+';margin-top:4px">&rarr; '+esc(t.youtubeOpportunity)+'</div>':'')+'</div>').join(""); }
      return c+'</div>'; }).join("");
    const scanned=Object.keys(INTEL).length;
    if(scanned>0) h+='<button class="go" id="ideasBtn" style="width:100%;justify-content:center;margin-bottom:6px" onclick="genIdeas()">Generate video ideas from '+scanned+' magazine'+(scanned>1?"s":"")+'</button>';
    h+='<div id="ideasBox" style="margin-top:18px"></div>';
    document.getElementById("view").innerHTML=h;
    if(window._ideasCache) document.getElementById("ideasBox").innerHTML=window._ideasCache;
  }
  async function scanMag(id){ const btn=document.getElementById("scan_"+id); btn.disabled=true; btn.innerHTML='<span class="spin"></span> Scanning...'; const r=await call2({action:"scan",magId:id}); if(r.ok&&r.data){ INTEL[id]=r.data; } renderIntel(); }
  async function genIdeas(){
    const box=document.getElementById("ideasBox"); box.innerHTML='<div class="tcard"><span class="spin"></span> &nbsp;Generating ideas...</div>';
    const topics=Object.values(INTEL).map(d=>'=== '+d.siteName+' ===\n'+((d.topics||[]).map(t=>'- '+t.headline+': '+(t.angle||"")).join('\n'))).join('\n\n');
    const r=await call2({action:"ideas",topics});
    if(!r.ok){ box.innerHTML='<div class="tcard">'+esc(r.error||"Error")+'</div>'; return; }
    let h='<h4 style="font-size:11px;color:'+C.muted+';text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px">Video ideas</h4>';
    h+=(r.ideas||[]).map(idea=>'<div class="tcard" style="flex-direction:column;align-items:stretch;gap:8px">'+(idea.overlap?'<div style="font-size:11px;color:'+C.green+';font-weight:700;text-transform:uppercase">&#9889; Cross-magazine trend, validated demand</div>':'')+'<div><div style="font-size:11px;color:'+C.muted+';text-transform:uppercase">Proven title</div><div style="font-size:14px;font-weight:700;color:var(--green-dark)">'+esc(idea.title)+'</div></div>'+(idea.freshTitle?'<div><div style="font-size:11px;color:#7c3aed;text-transform:uppercase">Fresh alternative</div><div style="font-size:14px;font-weight:600">'+esc(idea.freshTitle)+'</div></div>':'')+(idea.angle?'<div style="font-size:13px;color:'+C.muted+';line-height:1.6">'+esc(idea.angle)+'</div>':'')+(idea.whyNow?'<div style="font-size:12px;color:'+C.gold+'">Why now: '+esc(idea.whyNow)+'</div>':'')+'</div>').join("");
    window._ideasCache=h; box.innerHTML=h;
  }

  if(PW){ document.getElementById("pw").value=""; document.getElementById("login").style.display="none"; document.getElementById("app").style.display="block"; showTab("gen"); }
</script>
</body>
</html>
